spring.application.name=backend

# DataSource Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/nimbus}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway Configuration
spring.flyway.enabled=true

# GitHub OAuth Integration Configurations
nimbus.github.client-id=${GITHUB_CLIENT_ID:your_local_github_client_id_here}
nimbus.github.client-secret=${GITHUB_CLIENT_SECRET:your_local_github_client_secret_here}
nimbus.github.redirect-uri=${GITHUB_REDIRECT_URI:http://localhost:8080/api/github/callback}

# Default structural base target locations
nimbus.github.token-url=https://github.com/login/oauth/access_token
nimbus.github.user-url=https://api.github.com/user