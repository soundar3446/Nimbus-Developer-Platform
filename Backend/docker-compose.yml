version: "3.9"

services:

  postgres:
    build:
      context: "."
      dockerfile: docker/postgres/Dockerfile

    environment:
      POSTGRES_DB: nimbus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
      build:
        context: "."
        dockerfile: docker/tomcat/Dockerfile
      container_name: nimbus-backend
      depends_on:
        - postgres
      ports:
        - "8080:8080"
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
        - /home/soundar/.kube/config:/root/.kube/config:ro
      extra_hosts:
        - "host.docker.internal:host-gateway"
      restart: always
      env_file:
        - config.env


volumes:
  postgres_data:


